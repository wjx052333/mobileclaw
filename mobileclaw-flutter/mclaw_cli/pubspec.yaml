name: mclaw_cli
description: Command-line tool for testing mobileclaw SDK end-to-end
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.3
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  mobileclaw_sdk:
    path: ../packages/mobileclaw_sdk
  flutter_rust_bridge: ^2.9.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: false
